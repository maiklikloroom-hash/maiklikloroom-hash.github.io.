<!-- CONTACT -->
<section class="contact">

    <h2>Contact us</h2>
    <div style="color:#6aa84f; margin-bottom:20px;">*****</div>

    <div class="contact-form">

        <!-- LEFT -->
        <div class="contact-left">
            <label>Name *</label>
            <input type="text">

            <label>Company Name</label>
            <input type="text">

            <label>Position</label>
            <input type="text">

            <label>City</label>
            <input type="text">

            <label>Country</label>
            <input type="text">

            <label>Telephone</label>
            <input type="text">

            <label>Email *</label>
            <input type="email">
        </div>

        <!-- RIGHT -->
        <div class="contact-right">
            <label>You are a</label>
            <select>
                <option>seed producer</option>
                <option>distributor</option>
                <option>other</option>
            </select>

            <label>If other, please specify</label>
            <input type="text">

            <label>You are interested in</label>
            <textarea></textarea>

            <div class="contact-bottom">
                <div>
                    <small>Please type this code</small><br>
                    <strong>7 C J 3</strong>
                </div>

                <input type="text">

                <button class="btn">Send Message</button>
            </div>
        </div>

    </div>

    <!-- ADDRESS -->
    <div class="contact-address">
        <h4>Our Address</h4>
        AGRIDERA Seeds & Agriculture Ltd.<br>
        P.O Box 103,<br>
        Gedera 70750, Israel.<br>
        Telephone: +972 8 944 9222
    </div>

</section>
